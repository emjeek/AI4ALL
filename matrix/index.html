<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI4ALL helps people, businesses, schools, churches, and community teams make AI simple, practical, and genuinely useful.">
  <meta name="theme-color" content="#040302">
  <title>AI4ALL | Code Version</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="matrix-rain" aria-hidden="true"></canvas>
  <div class="code-vignette" aria-hidden="true"></div>
  <div class="scan-field" aria-hidden="true"></div>

  <header class="matrix-header">
    <a class="matrix-brand" href="/" aria-label="AI4ALL home">
      <span>AI</span><b>4</b><span>ALL</span>
      <small>code route</small>
    </a>
    <nav class="matrix-nav" aria-label="Version navigation">
      <a class="matrix-cta" href="mailto:Ai4All.mj@gmail.com?subject=AI%20clarity%20call">Book a clarity call</a>
    </nav>
  </header>

  <main class="matrix-shell" aria-live="polite">
    <section class="matrix-panel" id="matrix-panel">
      <p class="matrix-kicker" id="chapter-kicker">AI4ALL / Entry Point</p>
      <div class="chapter-readout">
        <span id="chapter-number">00</span>
        <i></i>
        <span id="chapter-total">08</span>
      </div>
      <h1 id="chapter-title">Make AI <em>actually useful.</em></h1>
      <p class="matrix-copy" id="chapter-copy">No jargon. No wasted time. Just useful AI for real life and real work.</p>
      <div class="chapter-body" id="chapter-body"></div>
      <div class="matrix-actions">
        <button type="button" id="prev-chapter">Back</button>
        <button class="primary" type="button" id="next-chapter">Enter the code</button>
      </div>
    </section>

    <aside class="matrix-console" aria-label="Journey status">
      <span id="depth-label">DEPTH 00</span>
      <p id="console-line">Waiting at the surface.</p>
      <div class="depth-track"><i id="depth-progress"></i></div>
      <small>Enter / ArrowRight: next | ArrowLeft: back | Escape: surface</small>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
